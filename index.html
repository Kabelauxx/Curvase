<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Curvase</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="curvase-app">

    <header id="header">
        <div id="header-left">
            <button type="button" id="ext-name" class="brand-btn" title="Switch to Tools — composition helpers and inspector. Click again for Curve.">Curvase</button>
            <span id="header-mode-badge" class="mode-badge" aria-live="polite">Curve</span>
            <span id="ext-author" class="ext-author"></span>
        </div>
        <div id="header-right">
            <button type="button" id="btn-speed-mode" class="header-chip" title="Speed graph view — Y is velocity, not value.">Speed</button>

            <div id="audio-controls">
                <button type="button" id="btn-mute" title="Mute / Unmute" aria-label="Mute or unmute background video">🔊</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" title="Volume" aria-label="Background video volume">
            </div>

            <button type="button" class="icon-btn" id="btn-spectrum" title="Spectrum — live FFT overlay from background video or audio. Requires a video or audio source." aria-label="Toggle live spectrum overlay" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3"  y="14" width="2" height="7" rx="1"/>
                    <rect x="7"  y="9"  width="2" height="12" rx="1"/>
                    <rect x="11" y="5"  width="2" height="16" rx="1"/>
                    <rect x="15" y="10" width="2" height="11" rx="1"/>
                    <rect x="19" y="13" width="2" height="8"  rx="1"/>
                </svg>
            </button>

            <button type="button" class="icon-btn" id="btn-bg" title="Background — reference image or video behind the curve" aria-label="Set background image or video">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
            </button>
            <input type="file" id="bg-file-input" accept="image/*,video/*" style="display:none">
        </div>
    </header>

    <div id="view-curve">
        <div id="canvas-container" aria-label="Easing curve editor">
            <canvas id="curve-canvas" role="img" aria-label="Bezier easing curve"></canvas>
        </div>
        <p id="canvas-hint" class="canvas-hint">Scroll to zoom · Drag handles · Right-click graph · Double-click to reset · Ctrl+click to add point</p>

        <div id="controls">
            <div id="point-inputs">
                <div class="side-btns">
                    <button type="button" class="ctrl-btn" id="btn-undo" title="Undo (Ctrl+Z)" aria-label="Undo curve edit" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7v6h6"/><path d="M3 13C5 7 10 4 16 6a9 9 0 0 1 5 8"/>
                        </svg>
                    </button>
                    <button type="button" class="ctrl-btn" id="btn-redo" title="Redo (Ctrl+Y)" aria-label="Redo curve edit" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 7v6h-6"/><path d="M21 13C19 7 14 4 8 6a9 9 0 0 0-5 8"/>
                        </svg>
                    </button>
                    <button type="button" class="ctrl-btn" id="btn-read" title="Read easing from timeline selection (adjacent keys, not HOLD)" aria-label="Read easing from keyframes">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3L4.31 3C3.59 3 3 3.59 3 4.31L3 19.69C3 20.41 3.59 21 4.31 21L19.69 21C20.41 21 21 20.41 21 19.69L21 12"/>
                            <path d="M12 7c0 0 .21 2.64 1.29 3.71C14.36 11.79 17 12 17 12s-2.64.21-3.71 1.29C12.21 14.36 12 17 12 17s-.21-2.64-1.29-3.71C9.64 12.21 7 12 7 12s2.64-.21 3.71-1.29C11.79 9.64 12 7 12 7z"/>
                            <path d="M18.75 2.5s.12 1.45.71 2.04c.59.59 2.04.71 2.04.71s-1.45.12-2.04.71c-.59.59-.71 2.04-.71 2.04s-.12-1.45-.71-2.04C17.45 5.37 16 5.25 16 5.25s1.45-.12 2.04-.71c.59-.59.71-2.04.71-2.04z"/>
                        </svg>
                    </button>
                </div>

                <button type="button" id="bezier-display" class="bezier-display-btn" title="Edit numeric values (x1, y1, x2, y2)">0.42, 0.00, 0.58, 1.00</button>

                <div class="side-btns">
                    <button type="button" class="ctrl-btn" id="btn-import-preset" title="Import presets from JSON" aria-label="Import presets">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 14v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-6"/>
                            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                    <button type="button" class="ctrl-btn" id="btn-export-preset" title="Export presets to JSON" aria-label="Export presets">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 14v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-6"/>
                            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="hidden-inputs">
                <input type="number" id="x1" step="0.01" value="0.42">
                <input type="number" id="y1" step="0.01" value="0.00">
                <input type="number" id="x2" step="0.01" value="0.58">
                <input type="number" id="y2" step="0.01" value="1.00">
            </div>

            <div id="actions-row" class="apply-toolbar">
                <button type="button" id="btn-apply" title="Apply curve to selected layers and keyframes in After Effects" aria-label="Apply easing to keyframes"><span class="btn-label">Apply to keyframes</span></button>
            </div>

            <div id="resizer" role="separator" aria-orientation="horizontal" aria-label="Resize presets panel" title="Drag to resize presets list"></div>

            <div id="presets-header">
                <span class="presets-title">Presets</span>
                <input id="preset-search" type="search" placeholder="Search presets…" autocomplete="off" spellcheck="false" aria-label="Search presets">
                <div class="preset-buttons">
                    <button type="button" class="ctrl-btn danger" id="btn-delete-selected" title="Delete selected preset or category" aria-label="Delete preset">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                            <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                        </svg>
                    </button>
                    <button type="button" class="ctrl-btn" id="btn-save-preset" title="Save current curve as a preset" aria-label="Save preset">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="presets-panel"></div>
        </div>
    </div>

    <div id="view-tools" style="display:none">
        <div class="tools-layout">

            <div class="tools-group inspector-group">
                <div class="inspector-header">
                    <div class="tools-label">Inspector</div>
                    <span id="inspector-layer-name"></span>
                </div>
                <div id="inspector-rows"></div>
            </div>
            <div class="tools-row">
                <div class="tools-group">
                    <div class="tools-label">Anchor</div>
                    <span class="grid-rc-hint">Klik kanan kotak → Reverse</span>
                    <div class="grid-3x3">
                        <button type="button" class="grid-btn" id="anc-tl" title="Anchor top-left">↖</button>
                        <button type="button" class="grid-btn" id="anc-tc" title="Anchor top-center">↑</button>
                        <button type="button" class="grid-btn" id="anc-tr" title="Anchor top-right">↗</button>
                        <button type="button" class="grid-btn" id="anc-ml" title="Anchor middle-left">←</button>
                        <button type="button" class="grid-btn" id="anc-mc" title="Anchor center">⊕</button>
                        <button type="button" class="grid-btn" id="anc-mr" title="Anchor middle-right">→</button>
                        <button type="button" class="grid-btn" id="anc-bl" title="Anchor bottom-left">↙</button>
                        <button type="button" class="grid-btn" id="anc-bc" title="Anchor bottom-center">↓</button>
                        <button type="button" class="grid-btn" id="anc-br" title="Anchor bottom-right">↘</button>
                    </div>
                </div>

                <div class="tools-group">
                    <div class="tools-label">Align</div>
                    <span class="grid-rc-hint">Klik kanan kotak → Reverse</span>
                    <div class="grid-3x3">
                        <button type="button" class="grid-btn" id="ali-tl" title="Align top-left">↖</button>
                        <button type="button" class="grid-btn" id="ali-tc" title="Align top-center">↑</button>
                        <button type="button" class="grid-btn" id="ali-tr" title="Align top-right">↗</button>
                        <button type="button" class="grid-btn" id="ali-ml" title="Align middle-left">←</button>
                        <button type="button" class="grid-btn" id="ali-mc" title="Align center">⊕</button>
                        <button type="button" class="grid-btn" id="ali-mr" title="Align middle-right">→</button>
                        <button type="button" class="grid-btn" id="ali-bl" title="Align bottom-left">↙</button>
                        <button type="button" class="grid-btn" id="ali-bc" title="Align bottom-center">↓</button>
                        <button type="button" class="grid-btn" id="ali-br" title="Align bottom-right">↘</button>
                    </div>
                </div>
            </div>

            <div class="tools-group tools-group-comp">
                <div class="tools-label">Composition</div>
                <div class="comp-tools">
                    <div class="comp-create-row">
                        <select id="tool-comp-ratio">
                            <option value="16:9">16:9 — 1920×1080</option>
                            <option value="4:3">4:3 — 1440×1080</option>
                            <option value="1:1">1:1 — 1080×1080</option>
                        </select>
                        <button type="button" class="list-btn comp-btn-primary" id="tool-make-comp">Create Comp</button>
                    </div>
                    <div class="comp-grid">
                        <button type="button" class="list-btn" id="tool-solid-fill">Solid Fill</button>
                        <button type="button" class="list-btn" id="tool-cam-15">Camera 15mm</button>
                        <button type="button" class="list-btn" id="tool-null-parent">Null + Parent</button>
                        <button type="button" class="list-btn" id="tool-text-center">Text Center</button>
                        <button type="button" class="list-btn" id="tool-adj-comp">Adjustment (Comp)</button>
                        <button type="button" class="list-btn" id="tool-adj-layer">Adjustment (Layer)</button>
                        <button type="button" class="list-btn" id="tool-precomp">Precompose</button>
                        <button type="button" class="list-btn" id="tool-light">Light</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<div id="status-toast" class="status-toast" role="status" aria-live="polite" aria-atomic="true"></div>

<div id="edit-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content" role="document">
        <h3 id="modal-title">Curve values</h3>
        <p class="modal-hint">Four numbers: x1, y1, x2, y2 (comma-separated)</p>
        <input type="text" id="m-bezier-val" placeholder="0.42, 0.00, 0.58, 1.00" spellcheck="false" aria-describedby="modal-title">
        <div class="modal-actions">
            <button type="button" id="btn-modal-cancel">Cancel</button>
            <button type="button" id="btn-modal-save">Apply</button>
        </div>
    </div>
</div>

<script src="./lib/CSInterface-4.0.0.js"></script>
<script src="./curvase.js"></script>
<script src="./ext.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var bgInput = document.getElementById('bg-file-input');
        var audioControls = document.getElementById('audio-controls');
        if (bgInput) {
            bgInput.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                if (file.type.startsWith('video/')) {
                    audioControls.classList.add('show-audio');
                    setTimeout(function() {
                        if (window.editor && window.editor.bgVideoElement) {
                            window.editor.bgVideoElement.muted = false;
                            window.editor.bgVideoElement.play();
                        }
                    }, 300);
                } else {
                    audioControls.classList.remove('show-audio');
                }
            });
        }
    });
</script>
</body>
</html>
